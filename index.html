<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaFiep</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="header">
        <h1 class="logo">Pizza Fiep</h1>

        <div class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav class="menu" id="menu">
            <a href="#">Home</a>
            <a href="#">Cardápio</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>
    <div class="overlay-menu" id="overlay"></div>
    <!-- HERO -->
     <section class="hero">
        <div class="overlay">
            <div class="hero-text">
                <h2>A melhor indústria<br>de pizza do<br> Brasil</h2>
                <button>Peça Agora</button>
            </div>
        </div>
     </section>

    <section class="diferenciais">
        <h2>Nossos diferenciais</h2>
        <div class="cards">
            <div class="card">
                <img src="./tomate.png" alt="tomate">
                <p>Igredientes Frescos</p>
            </div>
            <div class="card">
                <img src="./fogo.png" alt="Fogueira">
                <p>Forno a Lenha</p>
            </div>
            <div class="card">
                <img src="./queijo.png" alt="Queijo">
                <p>Mussarela Artesenal</p>
            </div>
            <div class="card">
                <img src="./relampago.png" alt="Raio">
                <p>Entrega rápida</p>
            </div>
        </div> 
    </section>

    <script src="script.js"></script>
</body>
</html>
